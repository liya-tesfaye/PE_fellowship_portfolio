{% extends "base.html" %}
{% from "macros.html" import hobby_card %}

{% block content %}
<div class="banner">
    <h1 class="title">{{ title }}</h1>
</div>

<section class="container hobbies-grid">
    {% for hobby in hobbies %}
        {{ hobby_card(hobby) }}
    {% else %}
        <p>No hobbies added yet.</p>
    {% endfor %}
</section>
{% endblock %}

server {
	listen 80;
	server_name liya-demo1.duckdns.org;

	if ($host = liys-demo1.duckdns.org) {
		return 301 https://$host$request_url;
	}
}

server {
	listen 443 ssl;
	server_name liya-demo1.duckdns.org;

	location / {
		proxy_pass https://myportfolio:5000/;
	}

	# Load the certificate files.
	ssl_certificate /etc/letsencrypt/live/myportfolio/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/myportfolio/privket.pem;
	ssl_trusted_certificate /etc/letsencrypt/live/myportfolio/chain.pem;
}
